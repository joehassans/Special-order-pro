# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration
# For production: replace YOUR_RAILWAY_URL with your Railway domain (e.g. special-orders-pro-production.up.railway.app)

client_id = "7449d0eb28cab43135c401964353eef4"
name = "Special Orders Pro"
application_url = "https://special-order-pro-production.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
scopes = "write_products,write_metaobject_definitions,write_metaobjects,read_orders,read_draft_orders,read_customers,write_draft_orders,write_orders"

[auth]
redirect_urls = [
  "https://special-order-pro-production.up.railway.app/auth/callback",
  "https://special-order-pro-production.up.railway.app/auth/shopify/callback",
  "https://special-order-pro-production.up.railway.app/api/auth/callback"
]

[product.metafields.app.demo_info]
type = "single_line_text_field"
name = "Demo Source Info"
description = "Tracks products created by the Shopify app template for development"

  [product.metafields.app.demo_info.access]
  admin = "merchant_read_write"

[metaobjects.app.example]
name = "Example"
description = "An example metaobject definition created by this template"

  [metaobjects.app.example.access]
  admin = "merchant_read_write"

[metaobjects.app.example.fields.title]
name = "Title"
type = "single_line_text_field"
required = true

[metaobjects.app.example.fields.description]
name = "Description"
type = "multi_line_text_field"
