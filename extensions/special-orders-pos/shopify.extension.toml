api_version = "2026-01"

[[extensions]]
type = "ui_extension"
# Change the merchant-facing name of the extension in locales/en.default.json
name = "t:name"
uid = "7f8f55e9-1392-23a6-dbeb-28a3aa4e8516b056888a"
handle = "special-orders-pos"
description = "A preact POS UI extension"

# module: file that contains your extension’s source code
# target: location where your extension appears in POS
[[extensions.targeting]]
module = "./src/Tile.jsx"
target = "pos.home.tile.render"

[[extensions.targeting]]
module = "./src/Modal.jsx"
target = "pos.home.modal.render"

# Cart line item: same custom properties as legacy "Special Order X" (line item details → menu)
[[extensions.targeting]]
module = "./src/CartLineItemMenuItem.jsx"
target = "pos.cart.line-item-details.action.menu-item.render"

[[extensions.targeting]]
module = "./src/CartLineItemAction.jsx"
target = "pos.cart.line-item-details.action.render"
